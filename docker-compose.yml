services:
  db:
    image: postgres:13
    restart: unless-stopped
    volumes:
      - ./volumes/instagrain_db:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: instagrain

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - ./volumes/instagrain_minio:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-instagrain}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\"; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb --ignore-existing local/$$S3_BUCKET;
      mc anonymous set download local/$$S3_BUCKET;
      echo 'minio bucket ready: '$$S3_BUCKET;
      "

  web:
    image: ghcr.io/kelostrada/instagrain:${VERSION}-${VERSION_HASH}
    restart: unless-stopped
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DATABASE_URL: ecto://postgres:postgres@db/instagrain
      PHX_HOST: ${PHX_HOST}
      VERSION: ${VERSION}
      VERSION_HASH: ${VERSION_HASH}
      PHX_SERVER: ${PHX_SERVER}
      MAILJET_API_KEY: ${MAILJET_API_KEY}
      MAILJET_API_SECRET: ${MAILJET_API_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-instagrain}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
    ports:
      - "${PORT}:4000"
    depends_on:
      - db
      - minio