name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get the hash
        id: get_hash
        run: |
          echo "HASH=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: "Get Previous tag"
        id: previoustag
        uses: "WyriHaximus/github-action-get-previous-tag@master"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64/v8
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.previoustag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.previoustag.outputs.tag }}-${{ steps.get_hash.outputs.HASH }}
          build-args: |
            VERSION=${{ steps.previoustag.outputs.tag }}
            VERSION_HASH=${{ steps.get_hash.outputs.HASH }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH key and config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config << 'EOF'
          Host ssh.melinakrzemowa.pl
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Copy docker-compose.yml and deploy
        run: |
          VERSION=${{ steps.previoustag.outputs.tag }}
          VERSION_HASH=${{ steps.get_hash.outputs.HASH }}

          scp docker-compose.yml ${{ secrets.SSH_USERNAME }}@ssh.melinakrzemowa.pl:/home/${{ secrets.SSH_USERNAME }}/deploy/instagrain/

          SSH_TARGET=${{ secrets.SSH_USERNAME }}@ssh.melinakrzemowa.pl

          # Pull image, swap compose, recreate containers — single SSH session.
          ssh $SSH_TARGET "
            set -e
            sudo mv /home/${{ secrets.SSH_USERNAME }}/deploy/instagrain/docker-compose.yml /var/www/insta.melinakrzemowa.pl/docker-compose.yml
            cd /var/www/insta.melinakrzemowa.pl
            sudo sed -i 's/^VERSION=.*/VERSION=$VERSION/' .env
            sudo sed -i 's/^VERSION_HASH=.*/VERSION_HASH=$VERSION_HASH/' .env
            docker pull ghcr.io/kelostrada/instagrain:$VERSION-$VERSION_HASH
            docker compose up -d
          "

          # Wait until postgres accepts connections (release startup is slow on the Pi).
          for i in $(seq 1 30); do
            if ssh $SSH_TARGET 'docker exec instamelinakrzemowapl-db-1 pg_isready -U postgres -q'; then
              break
            fi
            echo "waiting for postgres... ($i)"
            sleep 2
          done

          # Retry migrate — the web release VM may still be initialising on the first try.
          for i in 1 2 3; do
            if ssh $SSH_TARGET 'docker exec instamelinakrzemowapl-web-1 /app/bin/migrate'; then
              echo "migrate succeeded on attempt $i"
              exit 0
            fi
            echo "migrate attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "migrate failed after 3 attempts" >&2
          exit 1
